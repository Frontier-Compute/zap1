name: anchor-liveness

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  prove-liveness:
    runs-on: ubuntu-latest
    env:
      ZAP1_API_BASE: https://api.frontiercompute.cash
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run anchor liveness proof
        run: python3 scripts/check_anchor_liveness.py

      - name: Validate API schemas
        env:
          ZAP1_ADMIN_API_KEY: ${{ secrets.ZAP1_ADMIN_API_KEY }}
        run: python3 conformance/check_api.py
